{% extends "base.html" %}

{% block content %}
<h1 class="page-title">Financial Settings</h1>
<p class="page-subtitle">Update your monthly budget and savings goal.</p>

<div class="form-box">
    <form method="POST">
        <label>Monthly Budget:</label><br>
        <input
            type="number"
            name="monthly_budget"
            step="0.01"
            min="0"
            value="{{ goals.monthly_budget }}"
            required
        ><br><br>

        <label>Savings Goal:</label><br>
        <input
            type="number"
            name="savings_goal"
            step="0.01"
            min="0"
            value="{{ goals.savings_goal }}"
            required
        ><br><br>

        <button type="submit">Save Settings</button>
    </form>

    <br>
    <a href="/dashboard">Back to Dashboard</a>
</div>
{% endblock %}
