{% extends "base.html" %}

{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Transaction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<div class="navbar">
    <h2>ChronoFinance</h2>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/transactions">Transactions</a>
        <a href="/logout">Logout</a>
    </div>
</div>
<body>
    <div class="container form-box">
        <h2>Edit Transaction</h2>

        <form method="POST">
            <label>Transaction Type:</label><br>
            <select name="transaction_type" id="transaction_type" required onchange="filterCategories()">
                <option value="Income" {% if transaction.transaction_type == 'Income' %}selected{% endif %}>Income</option>
                <option value="Expense" {% if transaction.transaction_type == 'Expense' %}selected{% endif %}>Expense</option>
            </select>
            <br><br>

            <label>Category:</label><br>
            <select name="category_id" id="category_id" required>
                {% for category in categories %}
                    <option value="{{ category.category_id }}"
                            data-type="{{ category.category_type }}"
                            {% if category.category_id == transaction.category_id %}selected{% endif %}>
                        {{ category.category_name }} ({{ category.category_type }})
                    </option>
                {% endfor %}
            </select>
            <br><br>

            <label>Amount:</label><br>
            <input type="number" step="0.01" name="amount" value="{{ transaction.amount }}" required>
            <br><br>

            <label>Description:</label><br>
            <input type="text" name="description" value="{{ transaction.description or '' }}">
            <br><br>

            <label>Date:</label><br>
            <input type="date" name="transaction_date" value="{{ transaction.transaction_date }}" required>
            <br><br>

            <button type="submit">Update Transaction</button>
        </form>

        <br>

        <div class="menu-links">
            <a href="/transactions">Back to Transactions</a>
            <a href="/dashboard">Dashboard</a>
        </div>
    </div>

    <script>
        function filterCategories() {
            let selectedType = document.getElementById("transaction_type").value;
            let categorySelect = document.getElementById("category_id");
            let options = categorySelect.options;

            for (let i = 0; i < options.length; i++) {
                let option = options[i];
                let optionType = option.getAttribute("data-type");

                if (!optionType || optionType === selectedType) {
                    option.style.display = "block";
                } else {
                    option.style.display = "none";
                }
            }

            let selectedOption = categorySelect.options[categorySelect.selectedIndex];
            if (selectedOption && selectedOption.style.display === "none") {
                categorySelect.value = "";
            }
        }

        window.onload = filterCategories;
    </script>
</body>
</html>
{% endblock %}
