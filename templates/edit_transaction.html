{% extends "base.html" %}

{% block title %}Edit Transaction | ChronoFinance{% endblock %}

{% block page_header %}
<div class="page-header">
    <h1>Edit Transaction</h1>
    <p>Update your transaction details below.</p>
</div>
{% endblock %}

{% block content %}
<div class="form-card">
    <form method="POST" action="{{ url_for('edit_transaction', transaction_id=transaction.transaction_id) }}" class="transaction-form">
        <div class="form-group">
            <label for="transaction_type">Transaction Type</label>
            <select name="transaction_type" id="transaction_type" required onchange="filterCategories()">
                <option value="Income" {% if transaction.transaction_type == 'Income' %}selected{% endif %}>Income</option>
                <option value="Expense" {% if transaction.transaction_type == 'Expense' %}selected{% endif %}>Expense</option>
            </select>
        </div>

        <div class="form-group">
            <label for="category_id">Category</label>
            <select name="category_id" id="category_id" required>
                {% for category in categories %}
                    <option value="{{ category.category_id }}"
                            data-type="{{ category.category_type }}"
                            {% if category.category_id == transaction.category_id %}selected{% endif %}>
                        {{ category.category_name }} ({{ category.category_type }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" step="0.01" name="amount" id="amount" value="{{ transaction.amount }}" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <input type="text" name="description" id="description" value="{{ transaction.description or '' }}">
        </div>

        <div class="form-group">
            <label for="transaction_date">Date</label>
            <input type="date" name="transaction_date" id="transaction_date" value="{{ transaction.transaction_date }}" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="primary-btn">Update Transaction</button>
            <a href="{{ url_for('transactions') }}" class="btn btn-secondary">Back to Transactions</a>
        </div>
    </form>
</div>

<script>
    function filterCategories() {
        let selectedType = document.getElementById("transaction_type").value;
        let categorySelect = document.getElementById("category_id");
        let options = categorySelect.options;

        for (let i = 0; i < options.length; i++) {
            let option = options[i];
            let optionType = option.getAttribute("data-type");

            if (!optionType || optionType === selectedType) {
                option.style.display = "block";
            } else {
                option.style.display = "none";
            }
        }

        let selectedOption = categorySelect.options[categorySelect.selectedIndex];
        if (selectedOption && selectedOption.style.display === "none") {
            categorySelect.value = "";
        }
    }

    window.onload = filterCategories;
</script>
{% endblock %}
