{% extends "base.html" %}

{% block title %}Add Transaction | ChronoFinance{% endblock %}

{% block page_header %}
<div class="page-header">
    <h1>Add Transaction</h1>
    <p>Add your income or expense details below.</p>
</div>
{% endblock %}

{% block content %}
<div class="form-card">
    <form method="POST" action="{{ url_for('add_transaction') }}" class="transaction-form">
        <div class="form-group">
            <label for="transaction_type">Transaction Type</label>
            <select name="transaction_type" id="transaction_type" required onchange="filterCategories()">
                <option value="">Select Type</option>
                <option value="Income">Income</option>
                <option value="Expense">Expense</option>
            </select>
        </div>

        <div class="form-group">
            <label for="category_id">Category</label>
            <select name="category_id" id="category_id" required>
                <option value="">Select Category</option>
                {% for category in categories %}
                    <option value="{{ category['category_id'] }}" data-type="{{ category['category_type'] }}">
                        {{ category['category_name'] }}{% if category['category_type'] %} ({{ category['category_type'] }}){% endif %}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" step="0.01" min="0" name="amount" id="amount" placeholder="Enter amount" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea name="description" id="description" rows="4" placeholder="Enter description"></textarea>
        </div>

        <div class="form-group">
            <label for="transaction_date">Transaction Date</label>
            <input type="date" name="transaction_date" id="transaction_date" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="primary-btn">Add Transaction</button>
            <a href="{{ url_for('transactions') }}" class="btn btn-secondary">Back</a>
        </div>
    </form>
</div>

<script>
    function filterCategories() {
        let selectedType = document.getElementById("transaction_type").value;
        let categorySelect = document.getElementById("category_id");
        let options = categorySelect.options;

        for (let i = 0; i < options.length; i++) {
            let option = options[i];
            let optionType = option.getAttribute("data-type");

            if (!optionType || optionType === selectedType || selectedType === "") {
                option.style.display = "block";
            } else {
                option.style.display = "none";
            }
        }

        let selectedOption = categorySelect.options[categorySelect.selectedIndex];
        if (selectedOption && selectedOption.style.display === "none") {
            categorySelect.value = "";
        }
    }

    window.onload = function () {
        document.getElementById("transaction_date").valueAsDate = new Date();
        filterCategories();
    };
</script>
{% endblock %}
