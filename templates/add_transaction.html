{% extends "base.html" %}

{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Transaction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<div class="navbar">
    <h2>ChronoFinance</h2>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/transactions">Transactions</a>
        <a href="/logout">Logout</a>
    </div>
</div>
<body>
    <div class="container form-box">
        <h2>Add Transaction</h2>

        <form method="POST">
            <label>Transaction Type:</label><br>
            <select name="transaction_type" id="transaction_type" required onchange="filterCategories()">
                <option value="">Select Type</option>
                <option value="Income">Income</option>
                <option value="Expense">Expense</option>
            </select>
            <br><br>

            <label>Category:</label><br>
            <select name="category_id" id="category_id" required>
                <option value="">Select Category</option>
                {% for category in categories %}
                    <option value="{{ category.category_id }}" data-type="{{ category.category_type }}">
                        {{ category.category_name }} ({{ category.category_type }})
                    </option>
                {% endfor %}
            </select>
            <br><br>

            <label>Amount:</label><br>
            <input type="number" step="0.01" name="amount" required>
            <br><br>

            <label>Description:</label><br>
            <input type="text" name="description">
            <br><br>

            <label>Date:</label><br>
            <input type="date" name="transaction_date" required>
            <br><br>

            <button type="submit">Save Transaction</button>
        </form>

        <br>
        <a href="/dashboard">Back to Dashboard</a>
    </div>

    <script>
        function filterCategories() {
            let selectedType = document.getElementById("transaction_type").value;
            let categorySelect = document.getElementById("category_id");
            let options = categorySelect.options;

            categorySelect.value = "";

            for (let i = 0; i < options.length; i++) {
                let option = options[i];

                if (option.value === "") {
                    option.style.display = "block";
                    continue;
                }

                if (option.getAttribute("data-type") === selectedType) {
                    option.style.display = "block";
                } else {
                    option.style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
{% endblock %}
