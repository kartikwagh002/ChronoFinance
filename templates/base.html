<!DOCTYPE html>
<html>
<head>
    <title>ChronoFinance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <div class="brand">ChronoFinance</div>

    <div class="nav-links">
        {% if session.get('user_id') %}
            <a href="/dashboard">Dashboard</a>
            <a href="/add-transaction">Add Transaction</a>
            <a href="/transactions">Transactions</a>
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/">Home</a>
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        {% endif %}
    </div>
</div>

<div class="page">
    <div class="card">
        {% block content %}
        {% endblock %}
    </div>
</div>

<footer style="text-align:center; margin-top:30px; padding:15px; border-top:1px solid #ddd;">
    <p style="font-weight:bold; margin:0;">ChronoFinance © 2026</p>
    <p style="font-size:13px; color:#777; margin:5px 0 0;">Built by Kartik & Awanti</p>
</footer>

</body>
</html>
